name: Release XCFramework

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1 (stable)
        with:
          toolchain: stable
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build XCFramework and generate Swift bindings
        run: ./scripts/build_xcframework.sh

      - name: Zip XCFramework
        run: zip -r TaskChampionFFIFFI.xcframework.zip TaskChampionFFIFFI.xcframework

      - name: Compute SHA-256 checksum
        id: checksum
        run: |
          CHECKSUM=$(shasum -a 256 TaskChampionFFIFFI.xcframework.zip | awk '{print $1}')
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload XCFramework zip
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          files: TaskChampionFFIFFI.xcframework.zip

      - name: Update Package.swift with release URL and checksum
        env:
          RELEASE_URL: https://github.com/tta-lab/taskchampion/releases/download/${{ github.ref_name }}/TaskChampionFFIFFI.xcframework.zip
          RELEASE_CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          python3 -c "
          import re, os
          url = os.environ['RELEASE_URL']
          checksum = os.environ['RELEASE_CHECKSUM']
          with open('Package.swift', 'r') as f:
              content = f.read()
          content = re.sub(r'url: \"[^\"]*\"', f'url: \"{url}\"', content)
          content = re.sub(r'checksum: \"[^\"]*\"', f'checksum: \"{checksum}\"', content)
          with open('Package.swift', 'w') as f:
              f.write(content)
          "

      - name: Commit updated Package.swift to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore(spm): update Package.swift for ${{ github.ref_name }} release"
          git push origin HEAD:main

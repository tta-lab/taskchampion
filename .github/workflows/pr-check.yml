name: PR Check

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: fmt
        run: |
          rustup component add rustfmt
          cargo fmt --all -- --check

      - name: clippy
        run: |
          rustup component add clippy
          cargo clippy --no-default-features --features storage-powersync --no-deps -- -D warnings

      - name: test
        run: cargo test --no-default-features --features storage-powersync
